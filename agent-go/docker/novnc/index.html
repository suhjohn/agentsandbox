<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>noVNC</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #111;
      }
      #screen {
        width: 100vw;
        height: 100vh;
      }
      #status {
        position: fixed;
        left: 12px;
        bottom: 12px;
        padding: 6px 10px;
        font: 12px/1.2 system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial,
          sans-serif;
        color: #fff;
        background: rgba(0, 0, 0, 0.55);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 8px;
        user-select: none;
        pointer-events: none;
      }
    </style>
    <script type="module" crossorigin="anonymous">
      import RFB from './core/rfb.js'

      function readQueryVariable (name, defaultValue) {
        const re = new RegExp('.*[?&]' + name + '=([^&#]*)')
        const match = document.location.href.match(re)
        if (match) return decodeURIComponent(match[1])
        return defaultValue
      }

      function setStatus (text) {
        const el = document.getElementById('status')
        if (el) el.textContent = text
      }

      const CONTROL_L = 0xffe3
      const KEY_V = 0x0076

      const host = readQueryVariable('host', window.location.hostname)
      let port = readQueryVariable('port', window.location.port)
      const password = readQueryVariable('password')
      const path = readQueryVariable('path', 'websockify')

      let url = window.location.protocol === 'https:' ? 'wss' : 'ws'
      url += '://' + host
      if (port) url += ':' + port
      url += '/' + path

      setStatus('Connecting…')

      const rfb = new RFB(document.getElementById('screen'), url, {
        credentials: { password }
      })

      rfb.addEventListener('connect', () => setStatus('Connected'))
      rfb.addEventListener('disconnect', e => {
        setStatus(
          e.detail.clean ? 'Disconnected' : 'Disconnected (unexpected error)'
        )
      })
      rfb.addEventListener('credentialsrequired', () => {
        const entered = prompt('VNC password:')
        rfb.sendCredentials({ password: entered ?? '' })
      })

      rfb.viewOnly = readQueryVariable('view_only', false)
      rfb.scaleViewport = readQueryVariable('scale', true) !== 'false'
      rfb.clipViewport = readQueryVariable('clip', false)
      rfb.resizeSession = readQueryVariable('remote_resize', true) !== 'false'
      rfb.focusOnClick = true

      function sendRemoteClipboard (text) {
        // noVNC API name varies slightly between versions.
        if (typeof rfb.clipboardPasteFrom === 'function') {
          rfb.clipboardPasteFrom(text)
          return
        }
        if (typeof rfb.sendClipboard === 'function') {
          rfb.sendClipboard(text)
        }
      }

      function sendCtrlCombo (keysym, code) {
        if (typeof rfb.sendKey !== 'function') return
        // Map host Cmd/Ctrl to remote Ctrl since the session is Linux.
        rfb.sendKey(CONTROL_L, 'ControlLeft', true)
        rfb.sendKey(keysym, code, true)
        rfb.sendKey(keysym, code, false)
        rfb.sendKey(CONTROL_L, 'ControlLeft', false)
      }

      function isCopyShortcut (e) {
        const key = (e.key || '').toLowerCase()
        return (e.ctrlKey || e.metaKey) && !e.altKey && !e.shiftKey && key === 'c'
      }

      function isPasteShortcut (e) {
        const key = (e.key || '').toLowerCase()
        return (e.ctrlKey || e.metaKey) && !e.altKey && !e.shiftKey && key === 'v'
      }

      let allowLocalClipboardWriteUntil = 0

      window.addEventListener(
        'keydown',
        async e => {
          if (rfb.viewOnly) return

          if (isCopyShortcut(e)) {
            // Best-effort: only attempt to write to the browser clipboard when the user
            // initiates a copy operation in the remote session.
            allowLocalClipboardWriteUntil = Date.now() + 1500
            return
          }

          if (!isPasteShortcut(e)) return
          if (!window.isSecureContext || !navigator.clipboard?.readText) return
          if (typeof rfb.sendKey !== 'function') return

          e.preventDefault()
          e.stopPropagation()

          try {
            const text = await navigator.clipboard.readText()
            if (typeof text === 'string') sendRemoteClipboard(text)
          } catch {
            // If clipboard read is blocked, still forward Ctrl+V so the remote app can
            // paste from whatever it already has.
          }

          sendCtrlCombo(KEY_V, 'KeyV')
        },
        true
      )

      rfb.addEventListener('clipboard', async e => {
        const text = e?.detail?.text
        if (typeof text !== 'string' || text.length === 0) return
        if (Date.now() > allowLocalClipboardWriteUntil) return
        if (!navigator.clipboard?.writeText) return

        try {
          await navigator.clipboard.writeText(text)
        } catch {
          // Clipboard writes are best-effort; browsers may block depending on context.
        }
      })
    </script>
  </head>
  <body>
    <div id="screen"></div>
    <div id="status">Loading…</div>
  </body>
</html>
