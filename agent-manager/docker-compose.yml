services:
  postgres:
    image: postgres:17
    ports:
      - "5679:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: agent_manager
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agent_manager"]
      interval: 2s
      timeout: 2s
      retries: 30
  redis:
    image: redis:7-alpine
    ports:
      - "5680:6379"
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 15
    volumes:
      - redisdata:/data
  temporaldb:
    image: postgres:17
    ports:
      - "5681:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - temporaldbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 2s
      retries: 30
  temporal:
    image: temporalio/auto-setup:latest
    ports:
      - "7233:7233"
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_SEEDS: temporaldb
      POSTGRES_USER: postgres
      POSTGRES_PWD: password
      DBNAME: temporal
      VISIBILITY_DBNAME: temporal_visibility
      ENABLE_ES: "false"
    depends_on:
      temporaldb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z temporal 7233"]
      interval: 2s
      timeout: 2s
      retries: 60
  temporal-ui:
    image: temporalio/ui:latest
    ports:
      - "8233:8080"
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    depends_on:
      temporal:
        condition: service_healthy
  agent-manager:
    build:
      context: ..
      dockerfile: agent-manager/Dockerfile
    ports:
      - "3132:3132"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://postgres:password@postgres:5432/agent_manager
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      temporal:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3132/health >/dev/null"]
      interval: 2s
      timeout: 2s
      retries: 30

volumes:
  pgdata:
  redisdata:
  temporaldbdata:
